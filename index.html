<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>30秒買房方向小測驗</title>
  <style>
    :root {
      --ink: #172421;
      --muted: #64736f;
      --line: #d9e4df;
      --paper: #fbf7ef;
      --panel: rgba(255, 255, 255, 0.94);
      --teal: #0b6b62;
      --teal-dark: #064d47;
      --mint: #dff1eb;
      --coral: #e67661;
      --gold: #f2bd4b;
      --blue: #b9d9ee;
      --shadow: 0 22px 55px rgba(15, 44, 41, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      background:
        linear-gradient(90deg, rgba(251, 247, 239, 0.98), rgba(251, 247, 239, 0.78)),
        url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: stretch;
    }

    .panel,
    .result {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .panel {
      min-height: 680px;
      padding: 28px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), #28a893);
      font-weight: 900;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .progress-wrap {
      min-width: 150px;
      text-align: right;
    }

    .progress-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e8efec;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--coral), var(--gold));
      transition: width 0.25s ease;
    }

    .trust-strip {
      margin: 0 0 22px;
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #f3fbf8;
      color: var(--teal-dark);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;
    }

    .trust-strip span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .question {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kicker {
      margin: 0 0 12px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 900;
    }

    .question h2 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(28px, 4vw, 45px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .hint {
      margin: 14px 0 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .fields,
    .choices {
      margin-top: 28px;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 50px;
      padding: 0 14px;
      outline: none;
    }

    .field textarea {
      min-height: 130px;
      padding: 14px;
      resize: vertical;
      line-height: 1.65;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(11, 107, 98, 0.12);
    }

    .field input.invalid {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(230, 118, 97, 0.13);
    }

    .field-error {
      color: #b94b3c;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice {
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .choice:hover {
      transform: translateY(-2px);
      border-color: rgba(11, 107, 98, 0.48);
      box-shadow: 0 12px 28px rgba(11, 107, 98, 0.12);
    }

    .choice.selected {
      border-color: var(--teal);
      background: var(--mint);
    }

    .choice-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--teal-dark);
      background: #f4f7f5;
      font-weight: 900;
    }

    .choice.selected .choice-mark {
      color: #fff;
      background: var(--teal);
    }

    .choice strong {
      display: block;
      font-size: 17px;
      line-height: 1.35;
    }

    .choice small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.45;
    }

    .check-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 52px;
      padding: 12px 13px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--teal);
    }

    .consent {
      margin-top: 18px;
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #edf8f4;
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.6;
      color: var(--teal-dark);
      font-weight: 800;
    }

    .consent input {
      width: 18px;
      height: 18px;
      margin-top: 3px;
      accent-color: var(--teal);
      flex: 0 0 auto;
    }

    .lead-box,
    .privacy-note {
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #f3fbf8;
      color: var(--teal-dark);
      padding: 12px 14px;
      line-height: 1.65;
    }

    .lead-box {
      margin-bottom: 16px;
      display: grid;
      gap: 4px;
    }

    .lead-box strong {
      font-size: 16px;
    }

    .privacy-note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      background: #fff;
    }

    .nav {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .completion {
      display: grid;
      gap: 18px;
      align-content: center;
      min-height: 480px;
    }

    .completion-badge {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--coral), var(--gold));
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 14px 35px rgba(11, 107, 98, 0.2);
    }

    .completion h2 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .completion-copy {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .result-tabs {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .result-tabs details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .result-tabs summary {
      cursor: pointer;
      padding: 14px 16px;
      color: var(--teal-dark);
      font-weight: 900;
      list-style-position: inside;
    }

    .result-tabs .tab-body {
      border-top: 1px solid var(--line);
      padding: 14px 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .completion-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .readiness {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .readiness-label {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      padding: 7px 10px;
      color: #fff;
      background: var(--teal);
      font-size: 13px;
      font-weight: 900;
    }

    .readiness-label.warm {
      background: var(--coral);
    }

    .readiness-label.calm {
      background: #516a79;
    }

    .readiness p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .btn {
      border: 0;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn.primary {
      color: #fff;
      background: var(--teal);
    }

    .btn.primary:hover {
      background: var(--teal-dark);
    }

    .btn.ghost {
      color: var(--teal-dark);
      background: #edf5f2;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result {
      min-height: 680px;
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .result h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .card {
      border: 1px solid rgba(21, 37, 35, 0.08);
      border-radius: 8px;
      background: var(--paper);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .photo {
      min-height: 150px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(11, 107, 98, 0.08), rgba(230, 118, 97, 0.18)),
        url("https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=900&q=80") center/cover;
      position: relative;
      overflow: hidden;
    }

    .photo span {
      position: absolute;
      left: 14px;
      bottom: 12px;
      color: #fff;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .persona {
      display: grid;
      gap: 6px;
    }

    .persona-name {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 900;
    }

    .persona-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      max-width: 100%;
      overflow-wrap: anywhere;
      color: var(--teal-dark);
      background: #e7f4ef;
      border: 1px solid #c8e4da;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
    }

    .score-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .score-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .score-head h3,
    .routes h3 {
      margin: 0;
      font-size: 16px;
    }

    .score-number {
      color: var(--teal);
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
    }

    .score-bars {
      display: grid;
      gap: 9px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .score-track {
      height: 8px;
      border-radius: 999px;
      background: #e8efec;
      overflow: hidden;
    }

    .score-fill {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--coral), var(--gold));
    }

    .routes {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .route-list {
      display: grid;
      gap: 9px;
    }

    .route {
      border: 1px solid #dfe8e4;
      border-radius: 8px;
      background: #fbfdfc;
      padding: 11px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .route-badge {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--teal);
      font-weight: 900;
    }

    .route strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }

    .route p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .advice {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .advice h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .advice ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      margin-top: auto;
      padding-top: 16px;
      display: grid;
      gap: 10px;
    }

    .toast {
      display: none;
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #e7f4ef;
      color: var(--teal-dark);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 900px) {
      body {
        background-attachment: scroll;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .panel,
      .result {
        min-height: auto;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .progress-wrap {
        text-align: left;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding: 10px 0;
      }

      .panel,
      .result {
        padding: 16px;
      }

      .brand h1 {
        font-size: 19px;
      }

      .question h2 {
        font-size: 28px;
      }

      .fields,
      .choices,
      .check-grid {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: 74px;
        padding: 13px;
      }

      .nav {
        flex-direction: column-reverse;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="app">
      <section class="panel" aria-live="polite">
        <div class="topbar">
          <div class="brand">
            <div class="mark">家</div>
            <div>
              <h1>30秒找出你的買房方向</h1>
              <p>先玩小測驗，最後再決定要不要留下手機。</p>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label" id="progressText">第 1 步，共 11 步</div>
            <div class="progress"><span id="progressBar"></span></div>
          </div>
        </div>

        <div class="trust-strip">
          <span>台南小魏 買厝作伙</span>
          <span>手機只用於回覆測驗結果</span>
          <span>不公開、不轉給第三方</span>
        </div>

        <div class="question" id="questionArea"></div>

        <div class="nav" id="navBar">
          <button class="btn ghost" id="backBtn" type="button">上一步</button>
          <button class="btn primary" id="nextBtn" type="button">下一步</button>
        </div>
      </section>

      <aside class="result">
        <h2>我的買房方向卡</h2>
        <div class="card">
          <div class="photo" role="img" aria-label="明亮住宅外觀">
            <span>您的找房方向</span>
          </div>
          <div class="persona">
            <p class="persona-name" id="personaName">測驗進行中</p>
            <p class="persona-copy" id="personaCopy">先回答區域、預算和條件，最後會產生買房人格與小魏建議。</p>
          </div>
          <div class="readiness" id="readinessPanel"></div>
          <div class="score-panel">
            <div class="score-head">
              <h3>找房方向清楚度</h3>
              <div class="score-number" id="clarityScore">0%</div>
            </div>
            <div class="score-bars" id="scoreBars"></div>
          </div>
          <div class="chips" id="chips"></div>
          <div class="routes">
            <h3>最直白建議</h3>
            <div class="route-list" id="routeList"></div>
          </div>
          <div class="advice">
            <h3>建議找房方向</h3>
            <ul id="adviceList">
              <li>先選區域、物件類型和預算，不用一開始就留下手機。</li>
              <li>條件越明確，結果卡給的建議會越接近真實找房方向。</li>
            </ul>
          </div>
        </div>
        <div class="actions">
          <button class="btn primary" id="copyBtn" type="button">複製需求摘要</button>
          <button class="btn ghost" id="restartBtn" type="button">重新填寫</button>
          <div class="toast" id="toast">已複製，可以貼到 Messenger 對話裡。</div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const steps = [
      {
        key: "area",
        kicker: "想找區域",
        title: "先從想住哪裡開始",
        hint: "例：永康、東區、安南區、仁德、歸仁、東橋、平實，或其他區域。",
        type: "text",
        placeholder: "請輸入想找的區域",
        required: true
      },
      {
        key: "propertyTypes",
        kicker: "物件類型",
        title: "想找的物件類型？",
        hint: "可複選，先把可以接受的類型都勾起來。",
        type: "multi",
        valuesKey: "propertyTypes",
        required: true,
        choices: ["套房", "電梯大樓", "透天", "電梯透天", "店面", "廠房", "土地"]
      },
      {
        key: "ages",
        kicker: "屋齡限制",
        title: "您希望購置的房屋屋齡限制？",
        hint: "可複選。選得越明確，後續篩選會越準。",
        type: "multi",
        valuesKey: "ages",
        required: true,
        exclusiveChoice: "不拘",
        choices: ["預售屋", "5年內", "5-10年", "10-20年", "20-30年", "不拘"]
      },
      {
        key: "budget",
        kicker: "預算範圍",
        title: "預算大約多少？",
        hint: "先抓總價區間就好，不用一開始就談貸款細節。",
        type: "single",
        choices: ["800萬以下", "800～1200萬", "1200～1600萬", "1600～2000萬", "2000萬以上", "自訂金額"],
        customInput: {
          when: "自訂金額",
          key: "customBudget",
          label: "自訂金額",
          placeholder: "例：1800萬內、2500萬左右"
        }
      },
      {

      navBar.style.display = "";
      if (!isStepVisible(steps[state.step])) {
        state.step = getNextStepIndex(state.step) ?? getPrevStepIndex(state.step) ?? 0;
      }

      const step = steps[state.step];
      const visible = visibleSteps();
      const currentPosition = visible.findIndex((item) => item.key === step.key) + 1;
      progressText.textContent = `第 ${currentPosition} 步，共 ${visible.length} 步`;
      progressBar.style.width = `${(currentPosition / visible.length) * 100}%`;
      backBtn.disabled = getPrevStepIndex(state.step) === null;
      nextBtn.textContent = getNextStepIndex(state.step) === null ? (BACKEND_URL ? "完成測驗" : "完成並複製") : "下一步";
      nextBtn.disabled = !isStepValid(step);

      questionArea.innerHTML = `
        <p class="kicker">${step.kicker}</p>
        <h2>${step.title}</h2>

    function visibleSteps() {
      return steps.filter(isStepVisible);
    }

    function isStepVisible(step) {
      return !step.condition || step.condition();
    }

    function getNextStepIndex(fromIndex) {
      for (let index = fromIndex + 1; index < steps.length; index += 1) {
        if (isStepVisible(steps[index])) return index;
      }
      return null;
    }

    function getPrevStepIndex(fromIndex) {
      for (let index = fromIndex - 1; index >= 0; index -= 1) {
        if (isStepVisible(steps[index])) return index;
      }
      return null;
    }

    function renderInput(step) {
      if (step.type === "fields") {
        return `
          <div class="fields">
            ${step.fields.map((field) => `
              <div class="field">
                <label for="${field.key}">${field.label}</label>
                <input id="${field.key}" class="${field.validator === "phone" && state[field.key] && !isPhoneValid(state[field.key]) ? "invalid" : ""}" type="${field.validator === "phone" ? "tel" : "text"}" value="${escapeHtml(state[field.key])}" placeholder="${field.placeholder}" autocomplete="off">
                ${field.validator === "phone" ? `<div class="field-error" id="${field.key}Error" style="display: ${state[field.key] && !isPhoneValid(state[field.key]) ? "block" : "none"};">請輸入正確手機號碼，格式例如 0912345678。</div>` : ""}
              </div>
            `).join("")}
          </div>
        `;
      }

      if (step.type === "text") {
        return `
          <div class="fields">
            <div class="field full">
              <label for="${step.key}">${step.title}</label>
              <input id="${step.key}" type="text" value="${escapeHtml(state[step.key])}" placeholder="${step.placeholder}" autocomplete="off">
            </div>
          </div>
        `;
      }

      if (step.type === "single") {
        const customInput = step.customInput && state[step.key] === step.customInput.when
          ? `
            <div class="fields">
              <div class="field full">
                <label for="${step.customInput.key}">${step.customInput.label}</label>
                <input id="${step.customInput.key}" type="text" value="${escapeHtml(state[step.customInput.key])}" placeholder="${step.customInput.placeholder}" autocomplete="off">
              </div>
            </div>
          `
          : "";

        return `
          <div class="choices">
            ${step.choices.map((choice, index) => `
              <button class="choice ${state[step.key] === choice ? "selected" : ""}" type="button" data-choice="${choice}">
                <span class="choice-mark">${index + 1}</span>
                <span>
                  <strong>${choice}</strong>
                  <small>${getChoiceHint(step.key, choice)}</small>
                </span>
              </button>
            `).join("")}
          </div>
          ${customInput}
        `;
      }

      if (step.type === "multi") {
        const values = state[step.valuesKey];
        const otherInput = step.otherChoice && values.includes(step.otherChoice)
          ? `
            <div class="fields">
              <div class="field full">
                <label for="${step.otherKey}">${step.otherLabel}</label>
                <textarea id="${step.otherKey}" placeholder="${step.otherPlaceholder}">${escapeHtml(state[step.otherKey])}</textarea>
              </div>
            </div>
          `
          : "";

        return `
          <div class="check-grid">
            ${step.choices.map((choice) => `
              <label class="check">
                <input type="checkbox" value="${choice}" ${values.includes(choice) ? "checked" : ""}>
                <span>${choice}</span>
              </label>
            `).join("")}
          </div>
          ${otherInput}
        `;
      }

      return `
        <div class="lead-box">
          <strong>您的買房方向已整理完成</strong>
          <span>留下稱呼和手機後，小魏會把這份結果整理給您，並依照條件回覆適合先看的物件方向。</span>

        <div class="fields">

      `;
    }

    function bindStepEvents(step) {
      if (step.type === "fields") {
        step.fields.forEach((field) => {
          const input = document.getElementById(field.key);
          input.addEventListener("input", (event) => {
            state[field.key] = event.target.value.trim();
            if (field.validator === "phone") {
              const error = document.getElementById(`${field.key}Error`);
              const invalid = Boolean(state[field.key]) && !isPhoneValid(state[field.key]);
              input.classList.toggle("invalid", invalid);
              if (error) error.style.display = invalid ? "block" : "none";
            }
            renderSummary();
            nextBtn.disabled = !isStepValid(step);
          });
        });
        return;
      }

      if (step.type === "text") {
        const input = document.getElementById(step.key);
        input.addEventListener("input", (event) => {
          state[step.key] = event.target.value.trim();
          renderSummary();
          nextBtn.disabled = !isStepValid(step);
        });
        return;
      }

      if (step.type === "single") {
        questionArea.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            state[step.key] = button.dataset.choice;
            if (step.key === "budget" && state.budget !== "自訂金額") state.customBudget = "";
            if (step.key === "parking" && state.parking !== "需要") state.parkingType = "";
            render();
          });
        });

        if (step.customInput && state[step.key] === step.customInput.when) {
          const input = document.getElementById(step.customInput.key);
          input.addEventListener("input", (event) => {
            state[step.customInput.key] = event.target.value.trim();
            renderSummary();
            nextBtn.disabled = !isStepValid(step);
          });
        }
        return;
      }

      if (step.type === "multi") {
        questionArea.querySelectorAll("input[type='checkbox']").forEach((box) => {
          box.addEventListener("change", (event) => {
            let values = [...questionArea.querySelectorAll("input[type='checkbox']:checked")].map((item) => item.value);
            if (step.exclusiveChoice && event.target.value === step.exclusiveChoice && event.target.checked) {
              values = [step.exclusiveChoice];
              if (step.otherKey) state[step.otherKey] = "";
            } else if (step.exclusiveChoice && values.includes(step.exclusiveChoice)) {
              values = values.filter((value) => value !== step.exclusiveChoice);
            }
            if (step.otherChoice && !values.includes(step.otherChoice)) state[step.otherKey] = "";
            state[step.valuesKey] = values;
            render();
          });
        });

        if (step.otherKey && document.getElementById(step.otherKey)) {
          document.getElementById(step.otherKey).addEventListener("input", (event) => {
            state[step.otherKey] = event.target.value.trim();
            renderSummary();
          });
        }
        return;
      }

      ["name", "contact"].forEach((key) => {
        const input = document.getElementById(key);
        input.addEventListener("input", (event) => {
          state[key] = event.target.value.trim();
          if (key === "contact") {
            const error = document.getElementById("contactError");
            const invalid = Boolean(state.contact) && !isPhoneValid(state.contact);
            input.classList.toggle("invalid", invalid);
            if (error) error.style.display = invalid ? "block" : "none";
          }
          renderSummary();
          nextBtn.disabled = !isStepValid(step);
        });
      });
      document.getElementById("notes").addEventListener("input", (event) => {
        state.notes = event.target.value.trim();
        renderSummary();
      });
      document.getElementById("consent").addEventListener("change", (event) => {
        state.consent = event.target.checked;
        nextBtn.disabled = !isStepValid(step);
        renderSummary();
      });
    }

    function isStepValid(step) {
      if (step.type === "fields") {
        return step.fields.every((field) => {
          if (field.required && !state[field.key]) return false;
          if (field.validator === "phone") return isPhoneValid(state[field.key]);
          return true;
        });
      }
      if (step.type === "text") {
        return !step.required || Boolean(state[step.key]);
      }
      if (step.type === "single") {
        if (!state[step.key]) return false;
        if (step.customInput && state[step.key] === step.customInput.when) {
          return Boolean(state[step.customInput.key]);
        }
        return true;
      }
      if (step.type === "multi" && step.required) {
        return state[step.valuesKey].length > 0;
      }
      if (step.type === "final") {
        return Boolean(state.name) && isPhoneValid(state.contact) && state.consent;
      }
      return true;
    }

    function isPhoneValid(value) {
      return /^09\d{8}$/.test(normalizePhone(value));
    }

      return String(value || "").replace(/[\s-]/g, "");
    }

        return ["資產規劃型買方", "適合重點比較地段、使用分區、坪效和未來發展性。"];
      }
      if (state.purpose === "投資" || state.priorities.includes("價格合適")) {
        return ["精準比較型買方", "適合用行情、單價、租售需求和未來轉手性來整理物件。"];
      }
      if (state.purpose === "婚房") {
        return ["新生活規劃型買方", "適合兼顧屋況、機能、空間彈性與未來家庭需求。"];
      }
      if (state.purpose === "學區房" || state.priorities.includes("近學校")) {
        return ["學區機能型買方", "適合優先看學校距離、通勤動線和生活機能完整度。"];
      }
      if (state.purpose === "換屋" || state.rooms === "3房以上") {
        return ["空間升級型買方", "適合優先看格局、收納、停車和家庭成員未來使用需求。"];
      }
      if (state.priorities.includes("生活機能好") || state.priorities.includes("交通方便")) {
        return ["機能效率型買方", "適合從商圈、交通、學校和採買便利度來篩選物件。"];
      }
      if (state.priorities.includes("屋況好") || state.priorities.includes("採光通風")) {
        return ["舒適入住型買方", "適合找屋況佳、採光通風好，整理成本較低的物件。"];
      }
      if (state.budget === "800萬以下" || state.rooms === "1～2房" || hasPropertyType("套房")) {
        return ["首購起步型買方", "適合先鎖定低總價、生活便利、負擔相對穩定的物件。"];
      }
      return ["方向探索型買方", "適合先用區域、預算和生活條件抓出範圍，再慢慢比較物件。"];
    }

    function displayBudget() {
      if (state.budget === "自訂金額" && state.customBudget) {
        return `自訂金額：${state.customBudget}`;
      }
      return state.budget;
    }

    function displayPropertyTypes() {
      return state.propertyTypes.join("、");
    }

    function displayAges() {
      return state.ages.join("、");
    }

    function hasPropertyType(value) {
      return state.propertyTypes.includes(value);
    }

    function hasAge(value) {
      return state.ages.includes(value);
    }

    function displayParking() {
      if (state.parking === "需要" && state.parkingType) {
        return `${state.parking}，${state.parkingType}`;
      }
      return state.parking;
    }

    function displayFengShui() {
      const values = [...state.fengShui];
      const otherIndex = values.indexOf("其他 (請在下方說明)");
      if (otherIndex >= 0 && state.fengShuiOther) {
        values[otherIndex] = `其他：${state.fengShuiOther}`;
      }
      return values;
    }

    function getClarityScore() {
      const categories = [
        {
          label: "地點",
          value: scoreParts([
            [state.area, 30],
            [state.propertyTypes.length === 1, 30],
            [state.propertyTypes.length >= 2 && state.propertyTypes.length <= 3, 18],
            [state.propertyTypes.length > 3, 7],
            [state.ages.length === 1 && !hasAge("不拘"), 30],
            [state.ages.length >= 2 && state.ages.length <= 3 && !hasAge("不拘"), 18],
            [hasAge("不拘"), 6],
            [state.ages.length > 3 && !hasAge("不拘"), 8]
          ])
        },
        {
          label: "預算",
          value: getBudgetScore()
        },
        {
          label: "條件",
          value: scoreParts([
            [state.rooms && state.rooms !== "還不確定，先看適合的", 18],
            [state.rooms === "還不確定，先看適合的", 4],
            [state.parking === "需要" && state.parkingType, 22],
            [state.parking === "需要" && !state.parkingType, 8],
            [state.parking === "不需要", 18],
            [state.parking === "有的話更好", 8],
            [state.parking === "還不確定", 3],
            [state.priorities.length === 1, 8],
            [state.priorities.length >= 2 && state.priorities.length <= 4, 18],
            [state.priorities.length > 4, 10],
            [state.notes.length >= 8, 17],
            [state.notes && state.notes.length < 8, 6]
          ])
        },
        {
          label: "時程",
          value: scoreParts([
            [state.purpose && state.purpose !== "先了解行情", 48],
            [state.purpose === "先了解行情", 24],
            [state.timeline === "1個月內", 52],
            [state.timeline === "3個月內", 48],
            [state.timeline === "半年內", 40],
            [state.timeline === "一年內", 30],
            [state.timeline === "先看看，不急", 18]
          ])
        },
        {
          label: "忌諱",
          value: getFengShuiScore()
        }
      ];

      const total = Math.round(categories.reduce((sum, item) => sum + item.value, 0) / categories.length);
      return { total, categories };
    }

    function scoreParts(parts) {
      return Math.round(parts.reduce((sum, [condition, points]) => sum + (condition ? points : 0), 0));
    }

    function getBudgetScore() {
      if (!state.budget) return 0;
      if (state.budget === "自訂金額") return state.customBudget.length >= 3 ? 95 : 35;
      if (state.budget === "2000萬以上") return 55;
      if (state.budget === "800萬以下") return 72;
      return 76;
    }

    function getFengShuiScore() {
      if (!state.fengShui.length) return 0;
      if (state.fengShui.includes("無特殊忌諱")) return 58;
      let score = Math.min(82, 45 + state.fengShui.length * 11);
      if (state.fengShui.includes("其他 (請在下方說明)")) {
        score += state.fengShuiOther ? 18 : 0;
      } else {
        score += 8;
      }
      return Math.min(100, score);
    }

    function getBuyerReadiness() {
      let score = 0;
      const reasons = [];

      if (state.timeline === "1個月內") {
        score += 32;
        reasons.push("1個月內想購屋");
      } else if (state.timeline === "3個月內") {
        score += 28;
        reasons.push("3個月內想購屋");
      } else if (state.timeline === "半年內") {
        score += 20;
        reasons.push("半年內會開始比較");
      } else if (state.timeline === "一年內") {
        score += 12;
        reasons.push("一年內觀察");
      } else if (state.timeline === "先看看，不急") {
        score += 5;
        reasons.push("目前先了解市場");
      }

      if (state.area) {
        score += 15;
        reasons.push("區域明確");
      }
      if (state.budget === "自訂金額" && state.customBudget) {
        score += 18;
        reasons.push("預算有自訂範圍");
      } else if (state.budget && state.budget !== "2000萬以上") {
        score += 15;
        reasons.push("預算區間明確");
      } else if (state.budget === "2000萬以上") {
        score += 9;
        reasons.push("預算彈性較大");
      }
      if (state.propertyTypes.length >= 1 && state.propertyTypes.length <= 3) {
        score += 12;
        reasons.push("物件類型有方向");
      }
      if (state.ages.length && !hasAge("不拘")) {
        score += 8;
        reasons.push("屋齡條件明確");
      }
      if (state.purpose && state.purpose !== "先了解行情") {
        score += 10;
        reasons.push("購屋用途清楚");
      }
      if (isPhoneValid(state.contact)) {
        score += 5;
      }

      if (score >= 76) {
        return {
          level: "high",
          internalLabel: "高意願",
          clientLabel: "準備看房型",
          clientTitle: "可以開始整理實際物件清單",
          clientCopy: "您的區域、預算或時程已經有方向，適合直接挑 3 到 5 間符合條件的物件來比較。",
          reason: reasons.slice(0, 4).join("、") || "需求條件完整"
        };
      }
      if (score >= 50) {
        return {
          level: "warm",
          internalLabel: "中意願",
          clientLabel: "方向整理型",
          clientTitle: "先整理條件，再安排看房",
          clientCopy: "您的方向已經有輪廓，建議先用預算、區域和屋齡縮小範圍，再挑物件比較。",
          reason: reasons.slice(0, 4).join("、") || "已有部分找房方向"
        };
      }
      return {
        level: "calm",
        internalLabel: "低意願",
        clientLabel: "行情觀察型",
        clientTitle: "先建立行情感，不急著看房",
        clientCopy: "目前適合先了解區域價格、常見物件型態和貸款負擔，等方向更明確再安排看屋。",
        reason: reasons.slice(0, 4).join("、") || "目前以了解市場為主"
      };
    }

    function getDirectAdvice() {
      const area = state.area || "希望區域";
      const budget = displayBudget() || "預算範圍";
      const type = displayPropertyTypes() || "合適物件";
      const age = displayAges() || "可接受屋齡";

      if (hasPropertyType("店面") || hasPropertyType("廠房") || hasPropertyType("土地")) {
        return {
          title: "先確認使用目的，再看標的",
          copy: `${type}不要先用喜不喜歡判斷，建議先確認地段、使用分區、坪效和未來規劃，再用${budget}篩選。`
        };
      }
      if (state.purpose === "學區房" || state.priorities.includes("近學校")) {
        return {
          title: "先鎖學區和通勤，再看屋況",
          copy: `建議先整理${area}內學校距離、接送動線和生活採買，再從符合${budget}的物件裡挑屋況。`
        };
      }
      if (state.purpose === "婚房") {
        return {
          title: "先看能不能住得久",
          copy: `婚房建議優先看屋況、採光、生活機能和未來家庭空間彈性，不要只看裝潢漂亮。`
        };
      }
      if (hasAge("預售屋") || hasAge("5年內")) {
        return {
          title: "先比格局和總價，不急著衝新屋",
          copy: `如果鎖定${age}，建議同時比較格局、交屋時間、管理費和總價，避免只因屋齡新就下決定。`
        };
      }
      if (state.budget === "800萬以下" || hasPropertyType("套房")) {
        return {
          title: "先守住總價，再挑生活機能",
          copy: `建議先從${area}附近總價好控制、生活便利、轉手性穩定的物件開始看。`
        };
      }
      if (state.parking === "需要") {
        return {
          title: "先把車位當硬條件",
          copy: `建議先篩有${state.parkingType || "可用車位"}的物件，再看${type}和${age}，避免後面才發現停車不合適。`
        };
      }
      if (state.priorities.includes("生活機能好") || state.priorities.includes("交通方便")) {
        return {
          title: "先看生活圈，不要只看房子本身",
          copy: `建議優先比較商圈、交通、採買和日常動線，再從${budget}內找最順手的物件。`
        };
      }
      if (state.priorities.includes("屋況好") || state.priorities.includes("採光通風")) {
        return {
          title: "先看屋況和採光，降低整理成本",
          copy: `建議先找屋況佳、採光通風好的${type}，再比較價格，這樣入住壓力會比較低。`
        };
      }

      return {
        title: "先用區域和預算縮小範圍",
        copy: `建議先整理${area}符合${budget}的${type}，再用${age}、車位和格局條件做第二輪篩選。`
      };
    }

    function renderSummary() {
      const [name, copy] = getPersona();
      personaName.textContent = name;
      personaCopy.textContent = copy;

      const readiness = getBuyerReadiness();
      readinessPanel.innerHTML = `
        <span class="readiness-label ${readiness.level === "high" ? "" : readiness.level}">${escapeHtml(readiness.clientLabel)}</span>
        <p>${escapeHtml(readiness.clientCopy)}</p>
      `;

      const clarity = getClarityScore();
      clarityScore.textContent = `${clarity.total}%`;
      scoreBars.innerHTML = clarity.categories.map((item) => `
        <div class="score-row">
          <span>${escapeHtml(item.label)}</span>
          <span class="score-track"><span class="score-fill" style="width: ${item.value}%"></span></span>
          <span>${item.value}%</span>
        </div>
      `).join("");

      const directAdvice = getDirectAdvice();
      routeList.innerHTML = `
        <div class="route">
          <span class="route-badge">!</span>
          <span>
            <strong>${escapeHtml(directAdvice.title)}</strong>
            <p>${escapeHtml(directAdvice.copy)}</p>
          </span>
        </div>
      `;

      const items = [
        ["稱呼", state.name],
        ["手機", state.contact],
        ["區域", state.area],
        ["類型", displayPropertyTypes()],
        ["屋齡", displayAges()],
        ["預算", displayBudget()],
        ["房型", state.rooms],
        ["車位", displayParking()],
        ["用途", state.purpose],
        ["時間", state.timeline]
      ].filter(([, value]) => value);

      const priorityItems = state.priorities.map((value) => ["在意", value]);
      const fengShuiItems = displayFengShui().map((value) => ["忌諱", value]);
      const allChips = [...items, ...priorityItems, ...fengShuiItems];
      chips.innerHTML = allChips.length
        ? allChips.map(([label, value]) => `<span class="chip">${label}：${escapeHtml(value)}</span>`).join("")
        : `<span class="chip">等您開始填寫</span>`;

      const area = state.area || "希望區域";
      const budget = displayBudget() || "預算範圍";
      const propertyType = displayPropertyTypes() || "物件類型";
      const age = displayAges() || "屋齡限制";
      const priority = state.priorities.length ? state.priorities.join("、") : "生活機能、屋況與價格";
      adviceList.innerHTML = `
        <li>優先整理「${escapeHtml(area)}」附近符合「${escapeHtml(budget)}」的物件。</li>
        <li>先以「${escapeHtml(propertyType)}」和「${escapeHtml(age)}」為主，再依車位與用途縮小範圍。</li>
        <li>看屋時可特別比較「${escapeHtml(priority)}」，並同步避開已勾選的風水或格局忌諱。</li>
      `;
    }

    function getSummaryText() {
      const [persona] = getPersona();
      const clarity = getClarityScore();
      const directAdvice = getDirectAdvice();
      const readiness = getBuyerReadiness();
      return [
        "30秒買房方向小測驗",
        `怎麼稱呼您：${state.name || "未填"}`,
        `手機號碼：${state.contact || "未填"}`,
        `想找哪個區域：${state.area || "未填"}`,
        `想找的物件類型：${displayPropertyTypes() || "未選"}`,
        `希望購置的房屋屋齡限制：${displayAges() || "未選"}`,
        `預算大約多少：${displayBudget() || "未選"}`,
        `想找幾房：${state.rooms || "未選"}`,
        `需要車位嗎：${state.parking || "未選"}`,
        `車位類型：${state.parking === "需要" ? state.parkingType || "未選" : "未填"}`,
        `買房用途：${state.purpose || "未選"}`,
        `計劃何時準備購屋：${state.timeline || "未選"}`,
        `特別在意的條件：${state.priorities.length ? state.priorities.join("、") : "未填"}`,
        `風水或格局忌諱：${displayFengShui().length ? displayFengShui().join("、") : "未填"}`,
        `其他特別購屋需求或考量：${state.notes || "未填"}`,
        `同意聯繫：${state.consent ? "是" : "否"}`,
        `買方類型：${persona}`,
        `找房方向清楚度：${clarity.total}%`,
        `看房節奏：${readiness.clientLabel}`,
        `客戶熱度：${readiness.internalLabel}（${readiness.reason}）`,
        `最直白建議：${directAdvice.title}。${directAdvice.copy}`
      ].join("\n");
    }

    function getLeadPayload() {
      const [persona] = getPersona();
      const clarity = getClarityScore();
      const directAdvice = getDirectAdvice();
      const readiness = getBuyerReadiness();
      return {
        submittedAt: new Date().toISOString(),
        name: state.name,
        phone: normalizePhone(state.contact),
        area: state.area,
        propertyTypes: state.propertyTypes,
        ages: state.ages,
        budget: state.budget,
        customBudget: state.customBudget,
        rooms: state.rooms,
        parking: state.parking,
        parkingType: state.parkingType,
        purpose: state.purpose,
        timeline: state.timeline,
        priorities: state.priorities,
        fengShui: displayFengShui(),
        fengShuiOther: state.fengShuiOther,
        notes: state.notes,
        consent: state.consent,
        persona,
        clarityScore: clarity.total,
        leadTemperature: readiness.internalLabel,
        leadTemperatureReason: readiness.reason,
        buyerReadiness: readiness.clientLabel,
        directAdviceTitle: directAdvice.title,
        directAdviceCopy: directAdvice.copy,
        source: "互動網頁",
        summary: getSummaryText()
      };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    async function copySummary(message = "已複製，可以貼到 Messenger 對話裡。") {
      const text = getSummaryText();
      try {
        await navigator.clipboard.writeText(text);
        showToast(message);
      } catch {
        window.prompt("複製這段需求摘要：", text);
      }
    }

    async function submitLead() {
      if (!BACKEND_URL) {
        state.submitted = false;
        state.submitError = false;
        state.completed = true;
        await copySummary("尚未設定後端網址，已先複製需求摘要。");
        render();
        return;
      }

      nextBtn.disabled = true;
      nextBtn.textContent = "送出中...";
      try {
        await fetch(BACKEND_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(getLeadPayload())
        });
        state.submitted = true;
        state.submitError = false;
        state.completed = true;
        render();
        showToast("已送出，資料會進到客戶回覆資料表。");
      } catch {
        state.submitted = false;
        state.submitError = true;
        state.completed = true;
        await copySummary("送出失敗，已先複製需求摘要。");
        render();
      } finally {
        if (!state.completed) {
          nextBtn.disabled = !isStepValid(steps[state.step]);
          nextBtn.textContent = BACKEND_URL ? "完成測驗" : "完成並複製";
        }
      }
    }

    nextBtn.addEventListener("click", () => {
      const step = steps[state.step];
      if (!isStepValid(step)) return;
      const nextStep = getNextStepIndex(state.step);
      if (nextStep !== null) {
        state.step = nextStep;
        render();
        return;
      }
      submitLead();
    });

    backBtn.addEventListener("click", () => {
      const prevStep = getPrevStepIndex(state.step);
      if (prevStep !== null) {
        state.step = prevStep;
        render();
      }
    });

    copyBtn.addEventListener("click", copySummary);

    restartBtn.addEventListener("click", resetGame);

    function resetGame() {
      Object.assign(state, {
        step: 0,
        name: "",
        contact: "",
        area: "",
        propertyTypes: [],
        ages: [],
        budget: "",
        customBudget: "",
        rooms: "",
        parking: "",
        parkingType: "",
        purpose: "",
        timeline: "",
        priorities: [],
        fengShui: [],
        fengShuiOther: "",
        notes: "",
        consent: false,
        completed: false,
        submitted: false,
        submitError: false
      });
      toast.classList.remove("show");
      render();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
