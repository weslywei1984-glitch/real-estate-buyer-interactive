<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>買房需求小問卷</title>
  <style>
    :root {
      --ink: #172421;
      --muted: #64736f;
      --line: #d9e4df;
      --paper: #fbf7ef;
      --panel: rgba(255, 255, 255, 0.94);
      --teal: #0b6b62;
      --teal-dark: #064d47;
      --mint: #dff1eb;
      --coral: #e67661;
      --gold: #f2bd4b;
      --blue: #b9d9ee;
      --shadow: 0 22px 55px rgba(15, 44, 41, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      background:
        linear-gradient(90deg, rgba(251, 247, 239, 0.98), rgba(251, 247, 239, 0.78)),
        url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: stretch;
    }

    .panel,
    .result {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .panel {
      min-height: 680px;
      padding: 28px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), #28a893);
      font-weight: 900;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .progress-wrap {
      min-width: 150px;
      text-align: right;
    }

    .progress-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e8efec;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--coral), var(--gold));
      transition: width 0.25s ease;
    }

    .question {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kicker {
      margin: 0 0 12px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 900;
    }

    .question h2 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(28px, 4vw, 45px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .hint {
      margin: 14px 0 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .fields,
    .choices {
      margin-top: 28px;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 50px;
      padding: 0 14px;
      outline: none;
    }

    .field textarea {
      min-height: 130px;
      padding: 14px;
      resize: vertical;
      line-height: 1.65;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(11, 107, 98, 0.12);
    }

    .field input.invalid {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(230, 118, 97, 0.13);
    }

    .field-error {
      color: #b94b3c;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice {
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .choice:hover {
      transform: translateY(-2px);
      border-color: rgba(11, 107, 98, 0.48);
      box-shadow: 0 12px 28px rgba(11, 107, 98, 0.12);
    }

    .choice.selected {
      border-color: var(--teal);
      background: var(--mint);
    }

    .choice-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--teal-dark);
      background: #f4f7f5;
      font-weight: 900;
    }

    .choice.selected .choice-mark {
      color: #fff;
      background: var(--teal);
    }

    .choice strong {
      display: block;
      font-size: 17px;
      line-height: 1.35;
    }

    .choice small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.45;
    }

    .check-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 52px;
      padding: 12px 13px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--teal);
    }

    .consent {
      margin-top: 18px;
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #edf8f4;
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.6;
      color: var(--teal-dark);
      font-weight: 800;
    }

    .consent input {
      width: 18px;
      height: 18px;
      margin-top: 3px;
      accent-color: var(--teal);
      flex: 0 0 auto;
    }

    .nav {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .btn {
      border: 0;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn.primary {
      color: #fff;
      background: var(--teal);
    }

    .btn.primary:hover {
      background: var(--teal-dark);
    }

    .btn.ghost {
      color: var(--teal-dark);
      background: #edf5f2;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result {
      min-height: 680px;
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .result h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .card {
      border: 1px solid rgba(21, 37, 35, 0.08);
      border-radius: 8px;
      background: var(--paper);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .photo {
      min-height: 150px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(11, 107, 98, 0.08), rgba(230, 118, 97, 0.18)),
        url("https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=900&q=80") center/cover;
      position: relative;
      overflow: hidden;
    }

    .photo span {
      position: absolute;
      left: 14px;
      bottom: 12px;
      color: #fff;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .persona {
      display: grid;
      gap: 6px;
    }

    .persona-name {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 900;
    }

    .persona-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      max-width: 100%;
      overflow-wrap: anywhere;
      color: var(--teal-dark);
      background: #e7f4ef;
      border: 1px solid #c8e4da;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
    }

    .score-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .score-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .score-head h3,
    .routes h3 {
      margin: 0;
      font-size: 16px;
    }

    .score-number {
      color: var(--teal);
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
    }

    .score-bars {
      display: grid;
      gap: 9px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .score-track {
      height: 8px;
      border-radius: 999px;
      background: #e8efec;
      overflow: hidden;
    }

    .score-fill {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--coral), var(--gold));
    }

    .routes {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .route-list {
      display: grid;
      gap: 9px;
    }

    .route {
      border: 1px solid #dfe8e4;
      border-radius: 8px;
      background: #fbfdfc;
      padding: 11px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .route-badge {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--teal);
      font-weight: 900;
    }

    .route strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }

    .route p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .advice {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .advice h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .advice ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      margin-top: auto;
      padding-top: 16px;
      display: grid;
      gap: 10px;
    }

    .toast {
      display: none;
      border: 1px solid #c8e4da;
      border-radius: 8px;
      background: #e7f4ef;
      color: var(--teal-dark);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 900px) {
      body {
        background-attachment: scroll;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .panel,
      .result {
        min-height: auto;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .progress-wrap {
        text-align: left;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding: 10px 0;
      }

      .panel,
      .result {
        padding: 16px;
      }

      .brand h1 {
        font-size: 19px;
      }

      .question h2 {
        font-size: 28px;
      }

      .fields,
      .choices,
      .check-grid {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: 74px;
        padding: 13px;
      }

      .nav {
        flex-direction: column-reverse;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="app">
      <section class="panel" aria-live="polite">
        <div class="topbar">
          <div class="brand">
            <div class="mark">家</div>
            <div>
              <h1>買房需求小問卷</h1>
              <p>簡單填幾個方向，幫您整理適合物件參考。</p>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label" id="progressText">第 1 步，共 12 步</div>
            <div class="progress"><span id="progressBar"></span></div>
          </div>
        </div>

        <div class="question" id="questionArea"></div>

        <div class="nav">
          <button class="btn ghost" id="backBtn" type="button">上一步</button>
          <button class="btn primary" id="nextBtn" type="button">下一步</button>
        </div>
      </section>

      <aside class="result">
        <h2>買方偏好卡</h2>
        <div class="card">
          <div class="photo" role="img" aria-label="明亮住宅外觀">
            <span>您的找房方向</span>
          </div>
          <div class="persona">
            <p class="persona-name" id="personaName">慢慢整理中</p>
            <p class="persona-copy" id="personaCopy">填完後會產生一張清楚的買房偏好卡，方便後續幫您找物件。</p>
          </div>
          <div class="score-panel">
            <div class="score-head">
              <h3>找房方向清楚度</h3>
              <div class="score-number" id="clarityScore">0%</div>
            </div>
            <div class="score-bars" id="scoreBars"></div>
          </div>
          <div class="chips" id="chips"></div>
          <div class="routes">
            <h3>最直白建議</h3>
            <div class="route-list" id="routeList"></div>
          </div>
          <div class="advice">
            <h3>建議找房方向</h3>
            <ul id="adviceList">
              <li>先填稱呼與聯絡方式，再從區域、預算、房型慢慢篩。</li>
              <li>不用填得很精準，大概方向就能開始整理。</li>
            </ul>
          </div>
        </div>
        <div class="actions">
          <button class="btn primary" id="copyBtn" type="button">複製需求摘要</button>
          <button class="btn ghost" id="restartBtn" type="button">重新填寫</button>
          <div class="toast" id="toast">已複製，可以貼到 Messenger 對話裡。</div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const steps = [
      {
        key: "basic",
        kicker: "基本聯絡",
        title: "先讓我知道怎麼稱呼您",
        hint: "這兩項是表格裡的「怎麼稱呼您？」和「手機號碼」。",
        type: "fields",
        fields: [
          { key: "name", label: "怎麼稱呼您？", placeholder: "例：王小姐、陳先生", required: true },
          { key: "contact", label: "手機號碼", placeholder: "例：0912345678", required: true, validator: "phone" }
        ]
      },
      {
        key: "area",
        kicker: "想找區域",
        title: "想找哪個區域？",
        hint: "例：永康、東區、安南區、仁德、歸仁、東橋、平實，或其他區域。",
        type: "text",
        placeholder: "請輸入想找的區域",
        required: true
      },
      {
        key: "propertyTypes",
        kicker: "物件類型",
        title: "想找的物件類型？",
        hint: "可複選，先把可以接受的類型都勾起來。",
        type: "multi",
        valuesKey: "propertyTypes",
        required: true,
        choices: ["套房", "電梯大樓", "透天", "電梯透天", "店面", "廠房", "土地"]
      },
      {
        key: "ages",
        kicker: "屋齡限制",
        title: "您希望購置的房屋屋齡限制？",
        hint: "可複選。選得越明確，後續篩選會越準。",
        type: "multi",
        valuesKey: "ages",
        required: true,
        exclusiveChoice: "不拘",
        choices: ["預售屋", "5年內", "5-10年", "10-20年", "20-30年", "不拘"]
      },
      {
        key: "budget",
        kicker: "預算範圍",
        title: "預算大約多少？",
        hint: "先抓總價區間就好，不用一開始就談貸款細節。",
        type: "single",
        choices: ["800萬以下", "800～1200萬", "1200～1600萬", "1600～2000萬", "2000萬以上", "自訂金額"],
        customInput: {
          when: "自訂金額",
          key: "customBudget",
          label: "自訂金額",
          placeholder: "例：1800萬內、2500萬左右"
        }
      },
      {
        key: "rooms",
        kicker: "房型需求",
        title: "想找幾房？",
        hint: "依照現在居住人數或未來使用空間來選。",
        type: "single",
        choices: ["1～2房", "2房", "3房", "3房以上", "還不確定，先看適合的"]
      },
      {
        key: "parking",
        kicker: "車位需求",
        title: "需要車位嗎？",
        hint: "這會影響物件選擇和總價範圍。",
        type: "single",
        choices: ["需要", "不需要", "有的話更好", "還不確定"]
      },
      {
        key: "parkingType",
        kicker: "車位類型",
        title: "希望哪一種車位？",
        hint: "這題只有在選擇需要車位時出現。",
        type: "single",
        choices: ["平面車位", "平面、機械都可以"],
        condition: () => state.parking === "需要"
      },
      {
        key: "purpose",
        kicker: "購屋用途",
        title: "買房用途？",
        hint: "不同用途會影響我們幫您篩選物件的方式。",
        type: "single",
        choices: ["自住", "投資", "換屋", "幫家人找", "婚房", "學區房", "先了解行情"]
      },
      {
        key: "timeline",
        kicker: "購屋時程",
        title: "您計劃何時準備購屋？",
        hint: "有時間方向後，比較好安排適合的物件節奏。",
        type: "single",
        choices: ["1個月內", "3個月內", "半年內", "一年內", "先看看，不急"]
      },
      {
        key: "priorities",
        kicker: "在意條件",
        title: "有沒有特別在意的條件？",
        hint: "可以複選，這題選填。越清楚越能幫您篩出適合的房子。",
        type: "multi",
        valuesKey: "priorities",
        choices: ["交通方便", "生活機能好", "屋況好", "採光通風", "安靜", "近學校", "近市場/超市", "近公園", "管理好", "價格合適"]
      },
      {
        key: "fengShui",
        kicker: "風水與格局",
        title: "對於房產有無特定風水或格局上的忌諱？（可複選）",
        hint: "可複選；如果沒有特別忌諱，可以直接選「無特殊忌諱」。",
        type: "multi",
        valuesKey: "fengShui",
        choices: [
          "有無路沖、巷沖、壁刀",
          "有無房屋坐落於基地台、高壓電塔旁",
          "有無西曬問題",
          "有無高樓層或頂樓的限制",
          "廁所不能在房屋中央",
          "臥室門不能對到床或廁所門",
          "無特殊忌諱",

    // 後端網址貼這裡：部署 Google Apps Script 後，把「網頁應用程式網址」貼在下面引號中。
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxEDeuBcfgv9T9eJ7VnGYCWP5VALRv0JwF5dRiOwPPpcYQadmtInBs0-ithXkBhR1Fv/exec";

    const state = {
      step: 0,
      name: "",
      contact: "",
      area: "",
      propertyTypes: [],
      ages: [],
      budget: "",
      customBudget: "",
      rooms: "",
      parking: "",

    const questionArea = document.getElementById("questionArea");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const chips = document.getElementById("chips");

    const personaCopy = document.getElementById("personaCopy");

    function render() {
      if (!isStepVisible(steps[state.step])) {
        state.step = getNextStepIndex(state.step) ?? getPrevStepIndex(state.step) ?? 0;
      }

      const step = steps[state.step];
      const visible = visibleSteps();
      const currentPosition = visible.findIndex((item) => item.key === step.key) + 1;
      progressText.textContent = `第 ${currentPosition} 步，共 ${visible.length} 步`;
      progressBar.style.width = `${(currentPosition / visible.length) * 100}%`;
      backBtn.disabled = getPrevStepIndex(state.step) === null;
      nextBtn.textContent = getNextStepIndex(state.step) === null ? (BACKEND_URL ? "送出需求" : "完成並複製") : "下一步";
      nextBtn.disabled = !isStepValid(step);

      questionArea.innerHTML = `
        <p class="kicker">${step.kicker}</p>
        <h2>${step.title}</h2>
        <p class="hint">${step.hint}</p>
        ${renderInput(step)}
      `;

      bindStepEvents(step);
      renderSummary();
    }

    function visibleSteps() {
      return steps.filter(isStepVisible);
    }

    function isStepVisible(step) {
      return !step.condition || step.condition();
    }

    function getNextStepIndex(fromIndex) {
      for (let index = fromIndex + 1; index < steps.length; index += 1) {
        if (isStepVisible(steps[index])) return index;
      }
      return null;
    }

    function getPrevStepIndex(fromIndex) {
      for (let index = fromIndex - 1; index >= 0; index -= 1) {
        if (isStepVisible(steps[index])) return index;
      }
      return null;
    }

    function renderInput(step) {
      if (step.type === "fields") {
        return `
          <div class="fields">
            ${step.fields.map((field) => `
              <div class="field">
                <label for="${field.key}">${field.label}</label>
                <input id="${field.key}" class="${field.validator === "phone" && state[field.key] && !isPhoneValid(state[field.key]) ? "invalid" : ""}" type="${field.validator === "phone" ? "tel" : "text"}" value="${escapeHtml(state[field.key])}" placeholder="${field.placeholder}" autocomplete="off">
                ${field.validator === "phone" ? `<div class="field-error" id="${field.key}Error" style="display: ${state[field.key] && !isPhoneValid(state[field.key]) ? "block" : "none"};">請輸入正確手機號碼，格式例如 0912345678。</div>` : ""}
              </div>
            `).join("")}
          </div>
        `;
      }

      if (step.type === "text") {
        return `
          <div class="fields">
            <div class="field full">
              <label for="${step.key}">${step.title}</label>
              <input id="${step.key}" type="text" value="${escapeHtml(state[step.key])}" placeholder="${step.placeholder}" autocomplete="off">
            </div>
          </div>
        `;
      }

      if (step.type === "single") {
        const customInput = step.customInput && state[step.key] === step.customInput.when
          ? `
            <div class="fields">
              <div class="field full">
                <label for="${step.customInput.key}">${step.customInput.label}</label>
                <input id="${step.customInput.key}" type="text" value="${escapeHtml(state[step.customInput.key])}" placeholder="${step.customInput.placeholder}" autocomplete="off">
              </div>
            </div>
          `
          : "";

        return `
          <div class="choices">
            ${step.choices.map((choice, index) => `
              <button class="choice ${state[step.key] === choice ? "selected" : ""}" type="button" data-choice="${choice}">
                <span class="choice-mark">${index + 1}</span>
                <span>
                  <strong>${choice}</strong>
                  <small>${getChoiceHint(step.key, choice)}</small>
                </span>
              </button>
            `).join("")}
          </div>
          ${customInput}
        `;
      }

      if (step.type === "multi") {
        const values = state[step.valuesKey];
        const otherInput = step.otherChoice && values.includes(step.otherChoice)
          ? `
            <div class="fields">
              <div class="field full">
                <label for="${step.otherKey}">${step.otherLabel}</label>
                <textarea id="${step.otherKey}" placeholder="${step.otherPlaceholder}">${escapeHtml(state[step.otherKey])}</textarea>
              </div>
            </div>
          `
          : "";

        return `
          <div class="check-grid">
            ${step.choices.map((choice) => `
              <label class="check">
                <input type="checkbox" value="${choice}" ${values.includes(choice) ? "checked" : ""}>
                <span>${choice}</span>
              </label>
            `).join("")}
          </div>
          ${otherInput}
        `;
      }

      return `
        <div class="fields">
          <div class="field full">
            <label for="notes">${step.title}</label>
            <textarea id="notes" placeholder="${step.placeholder}">${escapeHtml(state.notes)}</textarea>
          </div>
        </div>
        <label class="consent">
          <input id="consent" type="checkbox" ${state.consent ? "checked" : ""}>
          <span>${step.consentText}</span>
        </label>
      `;
    }

    function bindStepEvents(step) {
      if (step.type === "fields") {
        step.fields.forEach((field) => {
          const input = document.getElementById(field.key);
          input.addEventListener("input", (event) => {
            state[field.key] = event.target.value.trim();
            if (field.validator === "phone") {
              const error = document.getElementById(`${field.key}Error`);
              const invalid = Boolean(state[field.key]) && !isPhoneValid(state[field.key]);
              input.classList.toggle("invalid", invalid);
              if (error) error.style.display = invalid ? "block" : "none";
            }
            renderSummary();
            nextBtn.disabled = !isStepValid(step);
          });
        });
        return;
      }

      if (step.type === "text") {
        const input = document.getElementById(step.key);
        input.addEventListener("input", (event) => {
          state[step.key] = event.target.value.trim();
          renderSummary();
          nextBtn.disabled = !isStepValid(step);
        });
        return;
      }

      if (step.type === "single") {
        questionArea.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            state[step.key] = button.dataset.choice;
            if (step.key === "budget" && state.budget !== "自訂金額") state.customBudget = "";
            if (step.key === "parking" && state.parking !== "需要") state.parkingType = "";
            render();
          });
        });

        if (step.customInput && state[step.key] === step.customInput.when) {
          const input = document.getElementById(step.customInput.key);
          input.addEventListener("input", (event) => {
            state[step.customInput.key] = event.target.value.trim();
            renderSummary();
            nextBtn.disabled = !isStepValid(step);
          });
        }
        return;
      }

      if (step.type === "multi") {
        questionArea.querySelectorAll("input[type='checkbox']").forEach((box) => {
          box.addEventListener("change", (event) => {
            let values = [...questionArea.querySelectorAll("input[type='checkbox']:checked")].map((item) => item.value);
            if (step.exclusiveChoice && event.target.value === step.exclusiveChoice && event.target.checked) {
              values = [step.exclusiveChoice];
              if (step.otherKey) state[step.otherKey] = "";
            } else if (step.exclusiveChoice && values.includes(step.exclusiveChoice)) {
              values = values.filter((value) => value !== step.exclusiveChoice);
            }
            if (step.otherChoice && !values.includes(step.otherChoice)) state[step.otherKey] = "";
            state[step.valuesKey] = values;
            render();
          });
        });

        if (step.otherKey && document.getElementById(step.otherKey)) {
          document.getElementById(step.otherKey).addEventListener("input", (event) => {
            state[step.otherKey] = event.target.value.trim();
            renderSummary();
          });
        }
        return;
      }

      document.getElementById("notes").addEventListener("input", (event) => {
        state.notes = event.target.value.trim();
        renderSummary();
      });
      document.getElementById("consent").addEventListener("change", (event) => {
        state.consent = event.target.checked;
        nextBtn.disabled = !isStepValid(step);
        renderSummary();
      });
    }

    function isStepValid(step) {
      if (step.type === "fields") {
        return step.fields.every((field) => {
          if (field.required && !state[field.key]) return false;
          if (field.validator === "phone") return isPhoneValid(state[field.key]);
          return true;
        });
      }
      if (step.type === "text") {
        return !step.required || Boolean(state[step.key]);
      }
      if (step.type === "single") {
        if (!state[step.key]) return false;
        if (step.customInput && state[step.key] === step.customInput.when) {
          return Boolean(state[step.customInput.key]);
        }
        return true;
      }
      if (step.type === "multi" && step.required) {
        return state[step.valuesKey].length > 0;
      }
      if (step.type === "final") {
        return state.consent;
      }
      return true;
    }

    function isPhoneValid(value) {
      return /^09\d{8}$/.test(normalizePhone(value));
    }

    function normalizePhone(value) {
      return String(value || "").replace(/[\s-]/g, "");
    }

    function getClarityScore() {
      const categories = [
        {
          label: "地點",
          value: scoreParts([
            [state.area, 30],
            [state.propertyTypes.length === 1, 30],
            [state.propertyTypes.length >= 2 && state.propertyTypes.length <= 3, 18],
            [state.propertyTypes.length > 3, 7],
            [state.ages.length === 1 && !hasAge("不拘"), 30],
            [state.ages.length >= 2 && state.ages.length <= 3 && !hasAge("不拘"), 18],
            [hasAge("不拘"), 6],
            [state.ages.length > 3 && !hasAge("不拘"), 8]
          ])
        },
        {
          label: "預算",
          value: getBudgetScore()
        },
        {
          label: "條件",
          value: scoreParts([
            [state.rooms && state.rooms !== "還不確定，先看適合的", 18],
            [state.rooms === "還不確定，先看適合的", 4],
            [state.parking === "需要" && state.parkingType, 22],
            [state.parking === "需要" && !state.parkingType, 8],
            [state.parking === "不需要", 18],
            [state.parking === "有的話更好", 8],
            [state.parking === "還不確定", 3],
            [state.priorities.length === 1, 8],
            [state.priorities.length >= 2 && state.priorities.length <= 4, 18],
            [state.priorities.length > 4, 10],
            [state.notes.length >= 8, 17],
            [state.notes && state.notes.length < 8, 6]
          ])
        },
        {
          label: "時程",
          value: scoreParts([
            [state.purpose && state.purpose !== "先了解行情", 48],
            [state.purpose === "先了解行情", 24],
            [state.timeline === "1個月內", 52],
            [state.timeline === "3個月內", 48],
            [state.timeline === "半年內", 40],
            [state.timeline === "一年內", 30],
            [state.timeline === "先看看，不急", 18]
          ])
        },
        {
          label: "忌諱",
          value: getFengShuiScore()
        }
      ];

      const total = Math.round(categories.reduce((sum, item) => sum + item.value, 0) / categories.length);
      return { total, categories };
    }

    function scoreParts(parts) {
      return Math.round(parts.reduce((sum, [condition, points]) => sum + (condition ? points : 0), 0));
    }

    function getBudgetScore() {
      if (!state.budget) return 0;
      if (state.budget === "自訂金額") return state.customBudget.length >= 3 ? 95 : 35;
      if (state.budget === "2000萬以上") return 55;
      if (state.budget === "800萬以下") return 72;
      return 76;
    }

    function getFengShuiScore() {
      if (!state.fengShui.length) return 0;
      if (state.fengShui.includes("無特殊忌諱")) return 58;
      let score = Math.min(82, 45 + state.fengShui.length * 11);
      if (state.fengShui.includes("其他 (請在下方說明)")) {
        score += state.fengShuiOther ? 18 : 0;
      } else {
        score += 8;
      }
      return Math.min(100, score);
    }

        return {
          title: "先把車位當硬條件",
          copy: `建議先篩有${state.parkingType || "可用車位"}的物件，再看${type}和${age}，避免後面才發現停車不合適。`
        };
      }
      if (state.priorities.includes("生活機能好") || state.priorities.includes("交通方便")) {
        return {
          title: "先看生活圈，不要只看房子本身",
          copy: `建議優先比較商圈、交通、採買和日常動線，再從${budget}內找最順手的物件。`
        };
      }
      if (state.priorities.includes("屋況好") || state.priorities.includes("採光通風")) {
        return {
          title: "先看屋況和採光，降低整理成本",
          copy: `建議先找屋況佳、採光通風好的${type}，再比較價格，這樣入住壓力會比較低。`
        };
      }

      return {
        title: "先用區域和預算縮小範圍",
        copy: `建議先整理${area}符合${budget}的${type}，再用${age}、車位和格局條件做第二輪篩選。`
      };
    }

    function renderSummary() {
      const [name, copy] = getPersona();
      personaName.textContent = name;
      personaCopy.textContent = copy;

      const clarity = getClarityScore();
      clarityScore.textContent = `${clarity.total}%`;
      scoreBars.innerHTML = clarity.categories.map((item) => `
        <div class="score-row">
          <span>${escapeHtml(item.label)}</span>
          <span class="score-track"><span class="score-fill" style="width: ${item.value}%"></span></span>
          <span>${item.value}%</span>
        </div>
      `).join("");

      const directAdvice = getDirectAdvice();
      routeList.innerHTML = `
        <div class="route">
          <span class="route-badge">!</span>
          <span>
            <strong>${escapeHtml(directAdvice.title)}</strong>
            <p>${escapeHtml(directAdvice.copy)}</p>
          </span>
        </div>
      `;

      const items = [
        ["稱呼", state.name],
        ["手機", state.contact],
        ["區域", state.area],
        ["類型", displayPropertyTypes()],
        ["屋齡", displayAges()],
        ["預算", displayBudget()],
        ["房型", state.rooms],
        ["車位", displayParking()],
        ["用途", state.purpose],
        ["時間", state.timeline]
      ].filter(([, value]) => value);

      const priorityItems = state.priorities.map((value) => ["在意", value]);
      const fengShuiItems = displayFengShui().map((value) => ["忌諱", value]);
      const allChips = [...items, ...priorityItems, ...fengShuiItems];
      chips.innerHTML = allChips.length
        ? allChips.map(([label, value]) => `<span class="chip">${label}：${escapeHtml(value)}</span>`).join("")
        : `<span class="chip">等您開始填寫</span>`;

      const area = state.area || "希望區域";
      const budget = displayBudget() || "預算範圍";
      const propertyType = displayPropertyTypes() || "物件類型";
      const age = displayAges() || "屋齡限制";
      const priority = state.priorities.length ? state.priorities.join("、") : "生活機能、屋況與價格";
      adviceList.innerHTML = `
        <li>優先整理「${escapeHtml(area)}」附近符合「${escapeHtml(budget)}」的物件。</li>
        <li>先以「${escapeHtml(propertyType)}」和「${escapeHtml(age)}」為主，再依車位與用途縮小範圍。</li>
        <li>看屋時可特別比較「${escapeHtml(priority)}」，並同步避開已勾選的風水或格局忌諱。</li>
      `;
    }

    function getSummaryText() {
      const [persona] = getPersona();
      const clarity = getClarityScore();
      const directAdvice = getDirectAdvice();
      return [
        "買房需求小問卷",
        `怎麼稱呼您：${state.name || "未填"}`,
        `手機號碼：${state.contact || "未填"}`,
        `想找哪個區域：${state.area || "未填"}`,
        `想找的物件類型：${displayPropertyTypes() || "未選"}`,
        `希望購置的房屋屋齡限制：${displayAges() || "未選"}`,
        `預算大約多少：${displayBudget() || "未選"}`,
        `想找幾房：${state.rooms || "未選"}`,
        `需要車位嗎：${state.parking || "未選"}`,
        `車位類型：${state.parking === "需要" ? state.parkingType || "未選" : "未填"}`,
        `買房用途：${state.purpose || "未選"}`,
        `計劃何時準備購屋：${state.timeline || "未選"}`,
        `特別在意的條件：${state.priorities.length ? state.priorities.join("、") : "未填"}`,
        `風水或格局忌諱：${displayFengShui().length ? displayFengShui().join("、") : "未填"}`,
        `其他特別購屋需求或考量：${state.notes || "未填"}`,
        `同意聯繫：${state.consent ? "是" : "否"}`,
        `買方類型：${persona}`,
        `找房方向清楚度：${clarity.total}%`,
        `最直白建議：${directAdvice.title}。${directAdvice.copy}`
      ].join("\n");
    }

    function getLeadPayload() {
      const [persona] = getPersona();
      const clarity = getClarityScore();
      const directAdvice = getDirectAdvice();
      return {
        submittedAt: new Date().toISOString(),
        name: state.name,
        phone: normalizePhone(state.contact),
        area: state.area,
        propertyTypes: state.propertyTypes,
        ages: state.ages,
        budget: state.budget,
        customBudget: state.customBudget,
        rooms: state.rooms,
        parking: state.parking,
        parkingType: state.parkingType,
        purpose: state.purpose,
        timeline: state.timeline,
        priorities: state.priorities,
        fengShui: displayFengShui(),
        fengShuiOther: state.fengShuiOther,
        notes: state.notes,
        consent: state.consent,
        persona,
        clarityScore: clarity.total,
        directAdviceTitle: directAdvice.title,
        directAdviceCopy: directAdvice.copy,
        source: "互動網頁",
        summary: getSummaryText()
      };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    async function copySummary(message = "已複製，可以貼到 Messenger 對話裡。") {
      const text = getSummaryText();
      try {
        await navigator.clipboard.writeText(text);
        showToast(message);
      } catch {
        window.prompt("複製這段需求摘要：", text);
      }
    }

    async function submitLead() {
      if (!BACKEND_URL) {
        await copySummary("尚未設定後端網址，已先複製需求摘要。");
        return;
      }

      nextBtn.disabled = true;
      nextBtn.textContent = "送出中...";
      try {
        await fetch(BACKEND_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(getLeadPayload())
        });
        showToast("已送出，資料會進到客戶回覆資料表。");
      } catch {
        await copySummary("送出失敗，已先複製需求摘要。");
      } finally {
        nextBtn.disabled = !isStepValid(steps[state.step]);
        nextBtn.textContent = BACKEND_URL ? "送出需求" : "完成並複製";
      }
    }

    nextBtn.addEventListener("click", () => {
      const step = steps[state.step];
      if (!isStepValid(step)) return;
      const nextStep = getNextStepIndex(state.step);
      if (nextStep !== null) {
        state.step = nextStep;
        render();
        return;
      }
      submitLead();
    });

    backBtn.addEventListener("click", () => {
      const prevStep = getPrevStepIndex(state.step);
      if (prevStep !== null) {
        state.step = prevStep;
        render();
      }
    });

    copyBtn.addEventListener("click", copySummary);

    restartBtn.addEventListener("click", () => {
      Object.assign(state, {
        step: 0,
        name: "",
        contact: "",
        area: "",
        propertyTypes: [],
        ages: [],
        budget: "",
        customBudget: "",
        rooms: "",
        parking: "",
        parkingType: "",
        purpose: "",
        timeline: "",
        priorities: [],
        fengShui: [],
        fengShuiOther: "",
        notes: "",
        consent: false
      });
      toast.classList.remove("show");
      render();
    });

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
